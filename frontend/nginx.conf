server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /api/ {
        # Docker'ın embedded DNS'ini kullanarak backend'in IP'sini her seferinde tazeler;
        # yoksa backend container'ı yeniden oluşturulup IP değiştiğinde nginx eski IP'yi
        # önbellekte tutmaya devam eder ve 502 Bad Gateway verir.
        resolver 127.0.0.11 valid=10s;
        set $backend_upstream backend:4000;
        proxy_pass http://$backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /socket.io/ {
        resolver 127.0.0.11 valid=10s;
        set $backend_upstream backend:4000;
        proxy_pass http://$backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
